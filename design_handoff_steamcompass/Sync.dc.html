<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @keyframes sc-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes sc-flow-x { 0% { left: -80px; } 100% { left: 320px; } }
    @media (prefers-reduced-motion: reduce) {
      .sc-spin, .sc-status { animation: none !important; }
    }
  </style>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#060A14"/>
      <circle cx="50" cy="50" r="28" fill="none" stroke="#4CF3FF" stroke-width="2"/>
    </svg>
  </template>
</helmet>

<div style="background:#060A14; color:#E9EEF5; font-family:'Inter',sans-serif; min-height:100vh; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;">

  <div style="position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image: linear-gradient(rgba(76,243,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(76,243,255,0.035) 1px, transparent 1px);
    background-size: 48px 48px;"></div>
  <div style="position:fixed; top:20%; left:20%; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle, rgba(76,243,255,0.10), transparent 70%); filter:blur(120px); z-index:0; pointer-events:none;"></div>

  <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:48px;">
    {{ scanVisual }}

    <div style="height:24px; display:flex; align-items:center; justify-content:center;">
      <div style="font-family:'IBM Plex Mono',monospace; font-size:15px; letter-spacing:1px; color:#4CF3FF;">{{ currentStatus }}</div>
    </div>

    <div style="width:320px; height:2px; background:#1B2436; border-radius:2px; overflow:hidden; position:relative;">
      <div style="position:absolute; top:0; bottom:0; width:80px; background:linear-gradient(90deg, transparent, #4CF3FF, transparent); animation: sc-flow-x 1.8s linear infinite;"></div>
    </div>

    <div style="font-family:'Inter',sans-serif; font-size:13px; color:#7C8AA0; text-align:center; max-width:360px;">Büyük kütüphanelerde bu biraz sürebilir, sekmeyi kapatmadan bekleyebilirsin.</div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { statusIndex: 0 };

  componentDidMount() {
    this._timer = setInterval(() => {
      this.setState(s => ({ statusIndex: (s.statusIndex + 1) % 4 }));
    }, 2200);
  }

  componentWillUnmount() {
    clearInterval(this._timer);
  }

  renderVals() {
    const cx = 160, cy = 160;
    const genres = [
      { name: 'RPG', angle: -90, dist: 90 },
      { name: 'Strateji', angle: -30, dist: 70 },
      { name: 'FPS', angle: 30, dist: 100 },
      { name: 'Rogue-like', angle: 90, dist: 80 },
      { name: 'Simülasyon', angle: 150, dist: 95 },
      { name: 'Macera', angle: -150, dist: 75 },
    ];
    const pts = genres.map(g => {
      const rad = (g.angle * Math.PI) / 180;
      return { ...g, x: cx + Math.cos(rad) * g.dist, y: cy + Math.sin(rad) * g.dist };
    });

    const scanVisual = React.createElement('svg', { width: 320, height: 320, viewBox: '0 0 320 320', style: { overflow: 'visible' } },
      [1,2,3].map(i => React.createElement('circle', { key:'ring'+i, cx, cy, r: i*36, fill:'none', stroke:'#1B2436', strokeWidth:1 })),
      pts.map((p,i) => React.createElement('line', { key:'l'+i, x1:cx, y1:cy, x2:p.x, y2:p.y, stroke:'#4CF3FF', strokeWidth:1, opacity:0.3 })),
      React.createElement('g', {
        className: 'sc-spin',
        style: { transformOrigin: `${cx}px ${cy}px`, animation: 'sc-spin 2.4s linear infinite' }
      },
        React.createElement('path', {
          d: `M ${cx} ${cy} L ${cx} ${cy-108} A 108 108 0 0 1 ${cx + 108*Math.sin(0.9)} ${cy - 108*Math.cos(0.9)} Z`,
          fill: 'rgba(76,243,255,0.16)'
        }),
        React.createElement('line', { x1:cx, y1:cy, x2:cx, y2:cy-108, stroke:'#4CF3FF', strokeWidth:2 })
      ),
      React.createElement('circle', { cx, cy, r:14, fill:'#0E1524', stroke:'#4CF3FF', strokeWidth:2 }),
      pts.map((p,i) => React.createElement('circle', { key:'p'+i, cx:p.x, cy:p.y, r:6, fill:'#060A14', stroke:'#4CF3FF', strokeWidth:1.5 }))
    );

    const statuses = [
      'KÜTÜPHANE OKUNUYOR...',
      '184 OYUN BULUNDU',
      'TÜR VERİLERİ EŞLEŞTİRİLİYOR...',
      'ZEVK PROFİLİ HESAPLANIYOR...',
    ];

    return {
      scanVisual,
      currentStatus: statuses[this.state.statusIndex],
    };
  }
}

</script>
</body>
</html>
