<div
  class="fixed bottom-0 left-0 right-0 z-[65] backdrop-blur-md px-10 py-3.5"
  style="background: rgba(14,21,36,0.95); border-top: 1px solid rgba(139,124,246,0.4);"
>
  <div class="max-w-[900px] mx-auto">
    <div class="flex gap-2 mb-2.5 flex-wrap">
      @for (s of suggestions; track s) {
        <div
          (click)="useSuggestion(s)"
          class="cursor-pointer font-mono text-[11px] px-3 py-1.5 rounded-full text-signal-violet"
          style="border: 1px solid rgba(139,124,246,0.4);"
        >
          {{ s }}
        </div>
      }
    </div>
    <div class="flex gap-2.5">
      <input
        type="text"
        placeholder="Sonuçları daraltmak için bir şey söyle..."
        [value]="input()"
        (input)="input.set($any($event.target).value)"
        (keydown.enter)="submit()"
        class="flex-1 bg-void-ink rounded-lg px-4 py-3 text-ghost-white text-[13px] font-body"
        style="border: 1px solid rgba(139,124,246,0.4);"
      />
      <div (click)="submit()" class="bg-signal-violet text-void-ink font-semibold px-[22px] py-3 rounded-lg cursor-pointer font-mono text-xs">
        Gönder
      </div>
    </div>
  </div>
</div>
